# ============================================================
# 公众号写作发布工具 · 配置文件 v8（通用社区版）
# ============================================================
# 📌 适用于任何品牌/品类，以下示例仅供参考
# 📌 首次使用只需填写【必填项】（仅4项）
# 📌 【可选项】全部有默认值，不填也能跑
# 📌 所有路径支持相对路径（相对于本文件所在目录）
# ============================================================


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔴 必填项（4项，不填脚本无法运行）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

brand:
  # 【必填】品牌名称，显示在文章末尾签名
  name: "{{brand_name}}"
  # 示例：瑞幸咖啡、旺旺食品、花西子

  # 【必填】产品名称
  product: "{{product_name}}"
  # 示例：生椰拿铁、旺旺大礼包、空气蜜粉

wechat:
  # 【必填】AppID —— 不知道怎么找？→ 见 README.md 第一步
  appid: "{{your_appid}}"

  # 【必填】AppSecret —— 不知道怎么找？→ 见 README.md 第一步
  secret: "{{your_appsecret}}"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🟡 可选项（不填则使用默认值，直接运行即可）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

brand:
  signature_line: ""
  promise_line: ""
  miniprogram_link: ""
  footer_image: ""

article:
  file: "./articles/01-example.md"
  title: "01"
  archive_path: "./articles"

theme:
  name: "simple"

image_search:
  pixabay_api_key: ""

seo:
  enabled: false

advanced:
  append_footer: false
  use_media_cache: true
